<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Buddyz — Create</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ964pXSK9iQdYc5G6uT4P8eWq71d+S44A/H+P60f4j4g9wQ/Y5A5B6F+g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <div class="header-left">
            <div class="logo">BZ</div>
            <div>
                <h1>Create Your Quiz</h1>
                <div class="small">Enter your display name and start creating.</div>
            </div>
        </div>
        <button class="menu-btn" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
    </header>

    <main id="app">
        <form id="creator-form" class="question-card">
            <div style="font-weight:700">Your Display Name</div>
            <div class="small" style="margin-top:8px">This is the name your friends will see.</div>
            <div style="margin-top:12px">
                <input type="text" id="creator-name" placeholder="e.g. Tola" required />
            </div>
            <div style="margin-top:12px">
                <button type="submit" class="btn">Start Creating</button>
            </div>
        </form>
    </main>

    <!-- Hamburger Menu Overlay -->
    <div id="menu-overlay" class="menu-overlay">
        <button class="close-btn" aria-label="Close menu">&times;</button>
        <ul class="menu-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#blog-list">Blog</a></li>
            <li><a href="#">Privacy Policy</a></li>
            <li><a href="#">Terms & Conditions</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
